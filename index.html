<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forma Sheet Lookup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 100%;
      padding: 32px 28px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .logo-icon { font-size: 28px; }
    .logo-text { font-size: 18px; font-weight: 700; color: #1B6EC2; }

    h1 { font-size: 15px; color: #444; font-weight: 600; margin-bottom: 4px; }

    .sheet-number {
      font-size: 22px;
      font-weight: 800;
      color: #0f1f3d;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .status-block {
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .status-block.error { background: #FFEBEE; border-left: 4px solid #DC3545; }

    .status-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 4px; }
    .status-value { font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .status-sub   { font-size: 12px; color: #555; margin-top: 4px; }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity 0.15s;
      color: #fff;
      background: #6F42C1;
      margin-bottom: 10px;
    }
    .btn:hover { opacity: 0.88; }

    .hint {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-top: 8px;
      line-height: 1.5;
    }

    .footer { font-size: 11px; color: #aaa; text-align: center; margin-top: 24px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <span class="logo-icon">📋</span>
    <span class="logo-text">Forma Sheets Lookup</span>
  </div>

  <h1>Sheet Number</h1>
  <div class="sheet-number" id="sheet-number-display">—</div>

  <div id="error-block" class="status-block error hidden">
    <div class="status-label">Status</div>
    <div class="status-value">⚠️ Invalid QR Code</div>
    <div class="status-sub">Missing sheet number or project ID. Please scan the QR code again.</div>
  </div>

  <a id="open-btn" href="#" target="_blank" class="btn hidden">
    🏗️ Open in ACC Build Sheets
  </a>

  <p class="hint" id="hint-text" class="hidden">
    You will need to sign in to your Autodesk account in ACC.
  </p>

  <div class="footer">Forma Sheets Add-in &nbsp;·&nbsp; Autodesk ACC</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const ACC_BASE = 'https://acc.autodesk.eu'; // change to https://acc.autodesk.com for US

// ─────────────────────────────────────────────────────────────────────────────
// READ QR PARAMS  ?n=Eb007-02-ZZZ-V5  &p=9ba6681e-...
// ─────────────────────────────────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const sheetNum  = params.get('n') || '';
const projectId = params.get('p') || '';

document.getElementById('sheet-number-display').textContent = sheetNum || '(no sheet number)';
document.title = sheetNum ? `${sheetNum} – Forma Sheets` : 'Forma Sheets Lookup';

// ─────────────────────────────────────────────────────────────────────────────
// MAIN
// ─────────────────────────────────────────────────────────────────────────────
if (!sheetNum || !projectId) {
  document.getElementById('error-block').classList.remove('hidden');
} else {
  const cleanId = projectId.startsWith('b.') ? projectId.slice(2) : projectId;
  const accUrl  = `${ACC_BASE}/build/sheets/projects/${cleanId}?moduleId=2d&searchText=${encodeURIComponent(sheetNum)}`;
  window.location.replace(accUrl);
}
</script>
</body>
</html>
